name: CI

on: [push, pull_request]

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: quickclean
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: quickclean
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U quickclean"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://quickclean:localdev@localhost:5432/quickclean?schema=public
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @quickclean/shared build
      - run: pnpm --filter api exec prisma generate
      - run: pnpm --filter api exec prisma migrate deploy
      - run: pnpm -r test
      - run: pnpm --filter api test:e2e
